<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفاجأة 😂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#00ff00;
    font-family:Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    width:90%;
}

h1{
    font-size:40px;
    min-height:70px;
}

button{
    margin-top:30px;
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#00ff00;
    color:#000;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.progress{
    width:80%;
    height:25px;
    background:#222;
    margin:30px auto;
    border-radius:20px;
    overflow:hidden;
    display:none;
}

.bar{
    width:0%;
    height:100%;
    background:#00ff00;
}
</style>

</head>
<body>

<div class="container">

<h1 id="text">
اضغطي على الزر 😄
</h1>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<button id="btn">ابدئي</button>

</div>

<script>

const messages = [

"جارٍ التعرف على المستخدم...",
"مرحبًا أنفال علاب 👀",
"جاري تحليل الهاتف...",
"جاري فحص الصور...",
"تم اختراق حساب انفال علاب ", 
"جاري اختراق الفايسبوك ", 
"تسكني في بني مراد انفال علاب ", 
"راه يسلم عليك كريمووووو 😂",
"ديديكاس لافامي بن شيخ فالغيبية 😂❤️",
"يلا تبقاي على خير 😆"

];

const text=document.getElementById("text");
const btn=document.getElementById("btn");
const progress=document.getElementById("progress");
const bar=document.getElementById("bar");

btn.onclick=function(){

btn.style.display="none";
progress.style.display="block";

let i=0;
let width=0;

const loading=setInterval(()=>{

width+=100/messages.length;
bar.style.width=width+"%";

text.innerHTML=messages[i];

i++;

if(i>=messages.length){
clearInterval(loading);
}

},1800);

}

</script>

</body>
</html>
