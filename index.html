<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مفاجأة 😂</title>
<style>
body{
    margin:0;
    background:#000;
    color:#00ff00;
    font-family:Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}
h1{
    font-size:40px;
}
</style>
</head>
<body>

<h1 id="text">جارٍ تحميل البيانات...</h1>

<script>
const messages = [
"التعرف على المستخدم...",
"مرحبًا أنفال علاب ",
"جاري تحليل الهاتف...",
"تم اختراق حساب انفال علاب ",
"جاري اختراق الفايسبوك  ",
"تسكني في بني مراد  انفال علاب ",
 "راه يسلم عليك كريموووووو ",
 " ديديكاس لافامي بن شيخ فالغيبية و عجوزتك بيانسوغ"
,

"ايا تبقاي على خير " 
];

let i = 0;

setInterval(()=>{
    if(i < messages.length){
        document.getElementById("text").innerHTML = messages[i];
        i++;
    }
},1800);
</script>

</body>
</html>
